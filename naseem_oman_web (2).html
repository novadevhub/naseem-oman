};

};

/* phone helpers — assumes Oman numbers by default (+968) */
function normalizePhone(phone) {
  if (!phone) return "";
  let p = String(phone).replace(/[^\d+]/g, "");
  if (p.startsWith("+")) p = p.slice(1);
  if (p.startsWith("00")) p = p.slice(2);
  if (!p.startsWith("968") && p.length <= 8) p = "968" + p;
  return p;
}
function telHref(phone) { return `tel:+${normalizePhone(phone)}`; }
function waHref(phone) { return `https://wa.me/${normalizePhone(phone)}`; }

/* ---------------------------------- firestore sync ---------------------------------- */
function useFirestoreData() {
  const [data, setData] = useState(DEFAULT_DATA);
  const [loading, setLoading] = useState(true);
  const [saveFlag, setSaveFlag] = useState("idle");
  const skipNext = useRef(false);

  useEffect(() => {
    if (!firebaseReady) { setLoading(false); return; }
    const unsub = DOC_REF().onSnapshot((snap) => {
      if (snap.exists) {
        const remote = snap.data();
        setData({ ...DEFAULT_DATA, ...remote, settings: { ...DEFAULT_DATA.settings, ...(remote.settings || {}) } });
      }
      setLoading(false);
    }, (err) => {
      console.error("Firestore listen error", err);
      setLoading(false);
    });
    return () => unsub();
  }, []);

  const persist = useCallback(async (next) => {
    setData(next);
    if (!firebaseReady) return;
    setSaveFlag("saving");
    try {
      await DOC_REF().set(next);
      setSaveFlag("saved");
    } catch (e) {
      console.error("save failed", e);
      setSaveFlag("error");
    }
    setTimeout(() => setSaveFlag("idle"), 1500);
  }, []);

  return { data, setData: persist, loading, saveFlag };
}

/* ---------------------------------- simple charts (no external lib) ---------------------------------- */
function SimpleBarChart({ data, height = 220 }) {
  const max = Math.max(1, ...data.map((d) => Math.max(d.income, d.expense)));
  const barW = 22, gap = 14;
  const w = data.length * (barW * 2 + gap) + 20;
  return (
    <svg viewBox={`0 0 ${w} ${height}`} width="100%" height={height} style={{ overflow: "visible" }}>
      {data.map((d, i) => {
        const x0 = 10 + i * (barW * 2 + gap);
        const hi = (d.income / max) * (height - 40);
        const he = (d.expense / max) * (height - 40);
        return (
          <g key={i}>
            <rect x={x0} y={height - 24 - hi} width={barW} height={hi} rx="4" fill={COLORS.blue} />
            <rect x={x0 + barW + 2} y={height - 24 - he} width={barW} height={he} rx="4" fill={COLORS.steel} />
            <text x={x0 + barW} y={height - 6} textAnchor="middle" fontSize="11" fill={COLORS.inkSoft} fontFamily="Tajawal">{d.label}</text>
          </g>
        );
      })}
    </svg>
  );
}

const PIE_COLORS = [COLORS.blue, COLORS.sky, COLORS.steel, COLORS.amber, COLORS.success, COLORS.danger, COLORS.navy];

function SimplePieChart({ data, size = 200 }) {
  const total = data.reduce((a, b) => a + b.value, 0) || 1;
  const r = size / 2 - 8, cx = size / 2, cy = size / 2;
  let angle = -90;
  const slices = data.map((d, i) => {
    const frac = d.value / total;
    const start = angle;
    const end = angle + frac * 360;
    angle = end;
    const large = end - start > 180 ? 1 : 0;
    const toXY = (deg) => {
      const rad = (deg * Math.PI) / 180;
      return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
    };
    const [x1, y1] = toXY(start), [x2, y2] = toXY(end);
    const path = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
    return <path key={i} d={path} fill={PIE_COLORS[i % PIE_COLORS.length]} stroke="#fff" strokeWidth="1.5" />;
  });
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 18, flexWrap: "wrap" }}>
      <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>{slices}</svg>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {data.map((d, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12.5, color: COLORS.inkSoft }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: PIE_COLORS[i % PIE_COLORS.length], display: "inline-block" }} />
            {d.name} — {fmtMoney(d.value)}
          </div>
        ))}
      </div>
    </div>
  );
}

    primary: { background: `linear-gradient(135deg, ${COLORS.blue}, ${COLORS.navy})`, color: "#fff", boxShadow: "0 2px 10px rgba(46,109,180,0.28)" },
    ghost: { background: "transparent", color: COLORS.navy, border: `1.5px solid ${COLORS.border}` },
    danger: { background: COLORS.dangerBg, color: COLORS.danger },
    success: { background: COLORS.successBg, color: COLORS.success },
    subtle: { background: COLORS.iceDeep, color: COLORS.navy },
    whatsapp: { background: "#E7F7EE", color: "#1D8A4C" },
  };
  return (
    <button {...rest} style={{ ...base, ...sizes[size], ...variants[variant], ...style }}
      onMouseDown={(e) => (e.currentTarget.style.transform = "scale(0.97)")}
      onMouseUp={(e) => (e.currentTarget.style.transform = "scale(1)")}
      onMouseLeave={(e) => (e.currentTarget.style.transform = "scale(1)")}>
      {icon && <Icon name={icon} size={16} />}
      {children}
    </button>
  );
}

function Badge({ children, tone = "steel" }) {
  const tones = {
    steel: { bg: COLORS.iceDeep, fg: COLORS.inkSoft }, success: { bg: COLORS.successBg, fg: COLORS.success },
    danger: { bg: COLORS.dangerBg, fg: COLORS.danger }, amber: { bg: COLORS.amberBg, fg: COLORS.amber }, blue: { bg: "#E4EEF9", fg: COLORS.blue },
  };
  const t = tones[tone];
  return <span style={{ background: t.bg, color: t.fg, padding: "3px 10px", borderRadius: 999, fontSize: 12.5, fontWeight: 700, whiteSpace: "nowrap" }}>{children}</span>;
}

function Card({ children, style, ...rest }) {
  return <div {...rest} style={{ background: COLORS.white, border: `1px solid ${COLORS.border}`, borderRadius: 16, boxShadow: "0 1px 3px rgba(11,37,69,0.05)", ...style }}>{children}</div>;
}

function Modal({ title, onClose, children, wide }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(8,27,54,0.45)", backdropFilter: "blur(2px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, padding: 16 }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: COLORS.white, borderRadius: 18, width: "100%", maxWidth: wide ? 640 : 480, maxHeight: "88vh", overflowY: "auto", boxShadow: "0 20px 60px rgba(8,27,54,0.35)" }}>

/* ---------------------------------- role gate ---------------------------------- */
function RoleGate({ data, onEnter, onDataChange, lang, setLang }) {
  const t = STR[lang];
  const [pin, setPin] = useState("");
  const [pinError, setPinError] = useState("");
  const [setupPin, setSetupPin] = useState("");
  const { settings, technicians } = data;
  const isSetup = technicians.length === 0;
  const companyName = lang === "ar" ? settings.companyNameAr : settings.companyNameEn;
  const tagline = lang === "ar" ? settings.taglineAr : settings.taglineEn;

  async function finishSetup() {
    if (!setupPin || setupPin.length < 4) { setPinError(t.pinShort); return; }
    await onDataChange({ ...data, settings: { ...settings, adminPin: setupPin } });
    onEnter({ role: "admin", name: lang === "ar" ? "المشرف" : "Admin" });
  }
  function tryAdminPin() {
    if (pin === settings.adminPin) onEnter({ role: "admin", name: lang === "ar" ? "المشرف" : "Admin" });
    else setPinError(t.pinWrong);
  }

  return (
    <div style={{ minHeight: 560, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: t.fontDisplay, background: `radial-gradient(circle at 30% 20%, ${COLORS.iceDeep}, ${COLORS.ice})`, padding: 20, borderRadius: 20, position: "relative" }}>
      <button onClick={() => setLang(lang === "ar" ? "en" : "ar")} style={{ position: "absolute", top: 16, insetInlineEnd: 16, border: `1.5px solid ${COLORS.border}`, background: "#fff", borderRadius: 999, padding: "6px 14px", display: "flex", alignItems: "center", gap: 6, cursor: "pointer", fontWeight: 700, fontSize: 12.5, color: COLORS.navy }}>
        <Icon name="globe" size={14} /> {t.langToggle}
      </button>
      <div style={{ width: "100%", maxWidth: 400 }}>
        <div style={{ textAlign: "center", marginBottom: 22 }}>
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 6 }}><LogoChip size={96} /></div>
          <div style={{ fontSize: 24, fontWeight: 900, color: COLORS.navy }}>{companyName}</div>
          <div style={{ fontSize: 13, color: COLORS.inkSoft, marginTop: 2 }}>{tagline}</div>
        </div>

        <Card style={{ padding: 24 }}>
          {isSetup ? (
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div style={{ fontWeight: 800, color: COLORS.navy, fontSize: 15.5 }}>{t.setupTitle}</div>
              <div style={{ fontSize: 13, color: COLORS.inkSoft, lineHeight: 1.7 }}>{t.setupDesc}</div>
              <Field label={t.adminPinLabel} required>
                <TextInput type="password" inputMode="numeric" value={setupPin} onChange={(e) => setSetupPin(e.target.value)} placeholder={t.pinPlaceholder} maxLength={6} />
              </Field>
              {pinError && <div style={{ color: COLORS.danger, fontSize: 13 }}>{pinError}</div>}
              <Button onClick={finishSetup} icon="check">{t.pinConfirm}</Button>
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <div style={{ fontWeight: 800, color: COLORS.navy, fontSize: 15.5 }}>{t.whoUses}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {technicians.map((tech) => (
                  <button key={tech.id} onClick={() => onEnter({ role: "tech", techId: tech.id, name: tech.name })}
                    style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", borderRadius: 12, border: `1.5px solid ${COLORS.border}`, background: COLORS.white, cursor: "pointer", fontFamily: "inherit", fontSize: 14.5, fontWeight: 700, color: COLORS.ink, textAlign: lang === "ar" ? "right" : "left" }}>
                    <span style={{ width: 34, height: 34, borderRadius: "50%", background: COLORS.iceDeep, display: "flex", alignItems: "center", justifyContent: "center", color: COLORS.blue }}><Icon name="wrench" size={16} /></span>
                    {tech.name}
                    <span style={{ marginInlineStart: "auto" }}><Badge tone="blue">{t.techBadge}</Badge></span>
                  </button>
                ))}
              </div>
              <div style={{ borderTop: `1px dashed ${COLORS.border}`, paddingTop: 14, display: "flex", flexDirection: "column", gap: 8 }}>
                <Field label={t.pinField}>
                  <div style={{ display: "flex", gap: 8 }}>
                    <TextInput type="password" inputMode="numeric" placeholder={t.adminPinLabel} value={pin} onChange={(e) => { setPin(e.target.value); setPinError(""); }} />
                    <Button size="md" onClick={tryAdminPin} icon="pin">{t.enterBtn}</Button>
                  </div>
                </Field>
                {pinError && <div style={{ color: COLORS.danger, fontSize: 13 }}>{pinError}</div>}
              </div>
              {technicians.length === 0 && <div style={{ fontSize: 12.5, color: COLORS.inkSoft }}>{t.noTechYet}</div>}
            </div>
          )}
        </Card>
      </div>
    </div>
  );
}

/* ---------------------------------- dashboard ---------------------------------- */
function Dashboard({ data, session, lang, t }) {
  const isAdmin = session.role === "admin";
  const myVisits = isAdmin ? data.visits : data.visits.filter((v) => v.technicianId === session.techId);
  const today = todayISO();
  const monthPrefix = today.slice(0, 7);
  const todayVisits = myVisits.filter((v) => v.date === today);
  const monthVisits = myVisits.filter((v) => v.date.startsWith(monthPrefix));
  const monthExpensesGeneral = isAdmin ? data.expenses.filter((e) => e.date.startsWith(monthPrefix)) : [];
  const sum = (arr, key) => arr.reduce((a, b) => a + Number(b[key] || 0), 0);
  const todayIncome = sum(todayVisits, "amount");
  const monthIncome = sum(monthVisits, "amount");
  const monthNet = monthIncome - sum(monthVisits, "expense") - sum(monthVisits, "commission") - sum(monthExpensesGeneral, "amount");

  const last7 = useMemo(() => {
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = daysAgoISO(i);
      const dv = myVisits.filter((v) => v.date === d);
      days.push({ label: new Date(d + "T00:00:00").toLocaleDateString(lang === "ar" ? "ar-OM" : "en-GB", { weekday: "short" }), income: sum(dv, "amount"), expense: sum(dv, "expense") + sum(dv, "commission") });
    }
    return days;
  }, [myVisits, lang]);

  const recentVisits = [...myVisits].sort((a, b) => (b.date + (b.createdAt||"")).localeCompare(a.date + (a.createdAt||""))).slice(0, 6);
  const customerMap = Object.fromEntries(data.customers.map((c) => [c.id, c]));

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px,1fr))", gap: 14 }}>
        <StatCard icon="money" tone="blue" label={t.todayIncome} value={`${fmtMoney(todayIncome)} ${lang === "ar" ? "ر.ع" : "OMR"}`} />
        <StatCard icon="wrench" tone="steel" label={t.todayVisits} value={todayVisits.length} />
        <StatCard icon="dashboard" tone="success" label={t.monthNet} value={`${fmtMoney(monthNet)} ${lang === "ar" ? "ر.ع" : "OMR"}`} />
        <StatCard icon="users" tone="amber" label={t.customerCount} value={data.customers.length} />
      </div>

      <Card style={{ padding: 20 }}>
        <div style={{ fontWeight: 800, color: COLORS.navy, marginBottom: 14, fontSize: 15 }}>{t.incomeVsExpense}</div>
        <SimpleBarChart data={last7} />
        <div style={{ display: "flex", gap: 16, marginTop: 8, fontSize: 12.5, color: COLORS.inkSoft }}>
          <span><span style={{ display: "inline-block", width: 10, height: 10, background: COLORS.blue, borderRadius: 3, marginInlineEnd: 5 }} />{t.income}</span>
          <span><span style={{ display: "inline-block", width: 10, height: 10, background: COLORS.steel, borderRadius: 3, marginInlineEnd: 5 }} />{t.expense}</span>
        </div>
      </Card>

      <Card style={{ padding: 20 }}>
        <div style={{ fontWeight: 800, color: COLORS.navy, marginBottom: 12, fontSize: 15 }}>{t.recentVisits}</div>
        {recentVisits.length === 0 && <EmptyState text={t.noVisitsYet} />}
        <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
          {recentVisits.map((v) => {
            const c = customerMap[v.customerId];
            return (
              <div key={v.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 4px", borderBottom: `1px solid ${COLORS.border}` }}>
                <span style={{ width: 36, height: 36, borderRadius: 10, background: COLORS.iceDeep, display: "flex", alignItems: "center", justifyContent: "center", color: COLORS.blue, flexShrink: 0 }}><Icon name="ac" size={17} /></span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{c ? c.name : "—"}</div>
                  <div style={{ fontSize: 12, color: COLORS.inkSoft }}>{STR[lang][v.serviceType] || v.serviceType} · {fmtDate(v.date, lang)}{isAdmin && c ? ` · ${c.location || ""}` : ""}</div>
                </div>
                <Badge tone="success">{fmtMoney(v.amount)} {lang === "ar" ? "ر.ع" : "OMR"}</Badge>
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

/* ---------------------------------- customers ---------------------------------- */
function Customers({ data, setData, session, lang, t }) {
  const isAdmin = session.role === "admin";

  const [editing, setEditing] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [detail, setDetail] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);

  const filtered = data.customers.filter((c) =>
    !q.trim() || c.name.includes(q) || (c.phone || "").includes(q) || (c.location || "").includes(q)
  ).sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));

  function openNew() { setEditing({ id: "", name: "", phone: "", location: "", acType: "acSplit", acCount: 1, notes: "" }); setShowForm(true); }
  function openEdit(c) { setEditing({ ...c }); setShowForm(true); }

  async function saveCustomer(c) {
    let next;
    if (c.id) next = { ...data, customers: data.customers.map((x) => (x.id === c.id ? c : x)) };
    else next = { ...data, customers: [...data.customers, { ...c, id: uid(), createdAt: new Date().toISOString() }] };
    await setData(next);
    setShowForm(false);
  }
  async function deleteCustomer(id) {
    await setData({ ...data, customers: data.customers.filter((c) => c.id !== id) });
    setConfirmDel(null);
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
        <div style={{ position: "relative", flex: 1, maxWidth: 340 }}>

          <TextInput placeholder={t.searchPlaceholder} value={q} onChange={(e) => setQ(e.target.value)} style={{ paddingInlineEnd: 36 }} />

        <Button icon="plus" onClick={openNew} style={{ marginInlineStart: "auto" }}>{t.newCustomer}</Button>

      {filtered.length === 0 && <EmptyState text={t.noMatchingCustomers} />}

        {filtered.map((c) => {
          const visits = data.visits.filter((v) => v.customerId === c.id);
          const total = visits.reduce((a, b) => a + Number(b.amount || 0), 0);
          return (
            <Card key={c.id} style={{ padding: 16, display: "flex", flexDirection: "column", gap: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 15 }}>{c.name}</div>
                  <div style={{ fontSize: 12.5, color: COLORS.inkSoft, marginTop: 2 }}>{c.location || "—"}</div>
                </div>
                <Badge tone="blue">{t[c.acType] || c.acType} × {c.acCount || 1}</Badge>
              </div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, color: COLORS.inkSoft }}>
                  <Icon name="phone" size={13} /> {c.phone || "—"}
                </div>
                <ContactButtons phone={c.phone} />
              </div>

/* ---------------------------------- reports ---------------------------------- */
function Reports({ data, lang, t }) {
  const [from, setFrom] = useState(daysAgoISO(29));
  const [to, setTo] = useState(todayISO());
  const visits = data.visits.filter((v) => v.date >= from && v.date <= to);
  const expenses = data.expenses.filter((e) => e.date >= from && e.date <= to);
  const sum = (arr, key) => arr.reduce((a, b) => a + Number(b[key] || 0), 0);
  const income = sum(visits, "amount");
  const visitExpense = sum(visits, "expense");
  const commission = sum(visits, "commission");
  const generalExpense = sum(expenses, "amount");
  const net = income - visitExpense - commission - generalExpense;

  const byTech = useMemo(() => {
    const map = {};
    visits.forEach((v) => {
      const name = data.technicians.find((tc) => tc.id === v.technicianId)?.name || "—";
      map[name] = (map[name] || 0) + Number(v.amount || 0);
    });
    return Object.entries(map).map(([name, value]) => ({ name, value }));
  }, [visits, data.technicians]);

  const byService = useMemo(() => {
    const map = {};
    visits.forEach((v) => { const label = t[v.serviceType] || v.serviceType; map[label] = (map[label] || 0) + Number(v.amount || 0); });
    return Object.entries(map).map(([name, value]) => ({ name, value }));
  }, [visits, t]);

  function exportExcel() {
    const wb = XLSX.utils.book_new();
    const custRows = data.customers.map((c) => ({
      [t.colCustomerName]: c.name, [t.colPhone]: c.phone, [t.colLocation]: c.location, [t.colAcType]: t[c.acType] || c.acType, [t.colAcCount]: c.acCount, [t.colNotes]: c.notes,
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(custRows), t.sheetCustomers);

    const techMap2 = Object.fromEntries(data.technicians.map((tc) => [tc.id, tc.name]));
    const custMap2 = Object.fromEntries(data.customers.map((c) => [c.id, c.name]));
    const visitRows = [...data.visits].sort((a, b) => a.date.localeCompare(b.date)).map((v) => ({
      [t.colDate]: v.date, [t.colCustomer]: custMap2[v.customerId] || "", [t.colTech]: techMap2[v.technicianId] || "",
      [t.colServiceType]: t[v.serviceType] || v.serviceType, [t.colAcCount]: v.acCount, [t.colAmount]: v.amount, [t.colVisitExpense]: v.expense, [t.colCommission]: v.commission, [t.colNotes]: v.notes,
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(visitRows), t.sheetVisits);

    const expRows = [...data.expenses].sort((a, b) => a.date.localeCompare(b.date)).map((e) => ({
      [t.colDate]: e.date, [t.colCategory]: t[e.category] || e.category, [t.colAmount]: e.amount, [t.colNote]: e.note,
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(expRows), t.sheetExpenses);

    const summaryRows = [
      { [t.sumPeriod]: `${from} → ${to}` },
      { [t.sumIncome]: income }, { [t.sumVisitExpense]: visitExpense }, { [t.sumCommission]: commission },
      { [t.sumGeneral]: generalExpense }, { [t.sumNet]: net },
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summaryRows), t.sheetSummary);

    const companyName = lang === "ar" ? data.settings.companyNameAr : data.settings.companyNameEn;
    XLSX.writeFile(wb, `${companyName}-${from}-${to}.xlsx`);
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
        <Field label={t.fromLabel}><TextInput type="date" value={from} onChange={(e) => setFrom(e.target.value)} /></Field>
        <Field label={t.toLabel}><TextInput type="date" value={to} onChange={(e) => setTo(e.target.value)} /></Field>
        <Button icon="download" onClick={exportExcel} style={{ marginInlineStart: "auto", alignSelf: "flex-end" }}>{t.exportExcel}</Button>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px,1fr))", gap: 14 }}>
        <StatCard icon="money" tone="blue" label={t.totalIncome} value={`${fmtMoney(income)} ${lang === "ar" ? "ر.ع" : "OMR"}`} />
        <StatCard icon="wallet" tone="steel" label={t.expensesAndCommissions} value={`${fmtMoney(visitExpense + commission + generalExpense)} ${lang === "ar" ? "ر.ع" : "OMR"}`} />
        <StatCard icon="dashboard" tone="success" label={t.netLabel} value={`${fmtMoney(net)} ${lang === "ar" ? "ر.ع" : "OMR"}`} />
        <StatCard icon="wrench" tone="amber" label={t.visitCount} value={visits.length} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <Card style={{ padding: 20 }}>
          <div style={{ fontWeight: 800, color: COLORS.navy, marginBottom: 10, fontSize: 14.5 }}>{t.incomeByTech}</div>
          {byTech.length === 0 ? <EmptyState text={t.noDataPeriod} /> : <SimplePieChart data={byTech} />}
        </Card>
        <Card style={{ padding: 20 }}>
          <div style={{ fontWeight: 800, color: COLORS.navy, marginBottom: 10, fontSize: 14.5 }}>{t.incomeByService}</div>
          {byService.length === 0 ? <EmptyState text={t.noDataPeriod} /> : <SimplePieChart data={byService} />}
        </Card>
      </div>
    </div>
  );
}

/* ---------------------------------- settings ---------------------------------- */
function Settings({ data, setData, lang, t }) {
  const [companyNameAr, setCompanyNameAr] = useState(data.settings.companyNameAr);
  const [companyNameEn, setCompanyNameEn] = useState(data.settings.companyNameEn);
  const [taglineAr, setTaglineAr] = useState(data.settings.taglineAr);
  const [taglineEn, setTaglineEn] = useState(data.settings.taglineEn);
  const [newPin, setNewPin] = useState("");
  const [pinMsg, setPinMsg] = useState("");
  const [showTechForm, setShowTechForm] = useState(false);
  const [editingTech, setEditingTech] = useState(null);
  const [confirmDelTech, setConfirmDelTech] = useState(null);

  async function saveCompanyInfo() {
    await setData({ ...data, settings: { ...data.settings, companyNameAr, companyNameEn, taglineAr, taglineEn } });
  }
  async function savePin() {
    if (newPin.length < 4) { setPinMsg(t.pinShort); return; }
    await setData({ ...data, settings: { ...data.settings, adminPin: newPin } });
    setPinMsg(t.pinUpdated);
    setNewPin("");
    setTimeout(() => setPinMsg(""), 2000);
  }
  async function saveTech(tc) {
    let next;
    if (tc.id) next = { ...data, technicians: data.technicians.map((x) => (x.id === tc.id ? tc : x)) };
    else next = { ...data, technicians: [...data.technicians, { ...tc, id: uid() }] };
    await setData(next);
    setShowTechForm(false); setEditingTech(null);
  }
  async function deleteTech(id) {
    await setData({ ...data, technicians: data.technicians.filter((tc) => tc.id !== id) });
    setConfirmDelTech(null);
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <Card style={{ padding: 20 }}>
        <div style={{ fontWeight: 800, color: COLORS.navy, marginBottom: 14, fontSize: 15 }}>{t.companyInfoTitle}</div>
        <div style={{ display: "flex", gap: 20, alignItems: "flex-start", flexWrap: "wrap" }}>
          <LogoChip size={80} />
          <div style={{ display: "flex", flexDirection: "column", gap: 12, flex: 1, minWidth: 220 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Field label={t.companyNameArLabel}><TextInput value={companyNameAr} onChange={(e) => setCompanyNameAr(e.target.value)} /></Field>
              <Field label={t.companyNameEnLabel}><TextInput value={companyNameEn} onChange={(e) => setCompanyNameEn(e.target.value)} /></Field>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Field label={t.taglineArLabel}><TextInput value={taglineAr} onChange={(e) => setTaglineAr(e.target.value)} /></Field>
              <Field label={t.taglineEnLabel}><TextInput value={taglineEn} onChange={(e) => setTaglineEn(e.target.value)} /></Field>
            </div>
            <Button onClick={saveCompanyInfo} icon="check" style={{ alignSelf: "flex-start" }}>{t.saveBtn}</Button>
          </div>
        </div>
      </Card>

      <Card style={{ padding: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div style={{ fontWeight: 800, color: COLORS.navy, fontSize: 15 }}>{t.techsTitle}</div>
          <Button size="sm" icon="plus" onClick={() => { setEditingTech({ id: "", name: "", phone: "" }); setShowTechForm(true); }}>{t.addTech}</Button>
        </div>
        {data.technicians.length === 0 && <EmptyState text={t.noTechs} />}
        <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
          {data.technicians.map((tc, i) => (
            <div key={tc.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 4px", borderBottom: i < data.technicians.length - 1 ? `1px solid ${COLORS.border}` : "none" }}>
              <span style={{ width: 34, height: 34, borderRadius: "50%", background: COLORS.iceDeep, display: "flex", alignItems: "center", justifyContent: "center", color: COLORS.blue }}><Icon name="wrench" size={16} /></span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 14 }}>{tc.name}</div>
                <div style={{ fontSize: 12, color: COLORS.inkSoft }}>{tc.phone || "—"}</div>
              </div>
              <Button size="sm" variant="subtle" icon="edit" onClick={() => { setEditingTech(tc); setShowTechForm(true); }}>{t.editBtn}</Button>
              <Button size="sm" variant="danger" icon="trash" onClick={() => setConfirmDelTech(tc.id)}>{t.deleteBtn}</Button>
            </div>
          ))}
        </div>
      </Card>

      <Card style={{ padding: 20 }}>
        <div style={{ fontWeight: 800, color: COLORS.navy, marginBottom: 14, fontSize: 15 }}>{t.pinSectionTitle}</div>
        <div style={{ display: "flex", gap: 10, alignItems: "flex-end", flexWrap: "wrap" }}>
          <Field label={t.newPinLabel}><TextInput type="password" inputMode="numeric" value={newPin} onChange={(e) => setNewPin(e.target.value)} placeholder="****" /></Field>
          <Button onClick={savePin} icon="pin">{t.updateBtn}</Button>
        </div>
        {pinMsg && <div style={{ fontSize: 13, color: COLORS.success, marginTop: 8 }}>{pinMsg}</div>}
      </Card>

      {showTechForm && (
        <Modal title={editingTech.id ? t.editTechTitle : t.newTechTitle} onClose={() => setShowTechForm(false)}>
          <TechForm value={editingTech} onCancel={() => setShowTechForm(false)} onSave={saveTech} t={t} />
        </Modal>
      )}
      {confirmDelTech && (
        <Modal title={t.confirmDeleteTitle} onClose={() => setConfirmDelTech(null)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div style={{ fontSize: 14 }}>{t.confirmDeleteTech}</div>
            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
              <Button variant="ghost" onClick={() => setConfirmDelTech(null)}>{t.cancelBtn}</Button>
              <Button variant="danger" onClick={() => deleteTech(confirmDelTech)}>{t.deletePermanently}</Button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function TechForm({ value, onCancel, onSave, t }) {
  const [form, setForm] = useState(value);
  const canSave = form.name.trim().length > 0;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <Field label={t.techNameLabel} required><TextInput value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} /></Field>
      <Field label={t.phoneLabel}><TextInput value={form.phone} onChange={(e) => setForm({ ...form, phone: e.target.value })} /></Field>
      <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
        <Button variant="ghost" onClick={onCancel}>{t.cancelBtn}</Button>
        <Button disabled={!canSave} style={{ opacity: canSave ? 1 : 0.5 }} onClick={() => onSave(form)} icon="check">{t.saveBtn}</Button>
      </div>
    </div>
  );
}

/* ---------------------------------- root app ---------------------------------- */
function App() {
  const [lang, setLang] = useState("ar");
  const { data, setData, loading, saveFlag } = useFirestoreData();
  const [session, setSession] = useState(null);
  const [view, setView] = useState("dashboard");
  useDocumentDir(lang);
  const t = STR[lang];

  if (loading) {
    return (
      <div style={{ minHeight: 500, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: t.fontDisplay }}>
        <div style={{ textAlign: "center", color: COLORS.navy }}>
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 12, animation: "spin 2.4s linear infinite" }}><LogoChip size={64} /></div>
          <div style={{ fontWeight: 700 }}>{firebaseReady ? t.loading : t.connecting}</div>
        </div>
      </div>
    );
  }

  if (!firebaseReady) {
    return (
      <div style={{ minHeight: 400, display: "flex", alignItems: "center", justifyContent: "center", padding: 30, fontFamily: t.fontDisplay, textAlign: "center" }}>
        <div style={{ maxWidth: 420, color: COLORS.danger, fontWeight: 700 }}>{t.noFirebase}</div>
      </div>
    );
  }

  if (!session) {
    return <RoleGate data={data} onEnter={setSession} onDataChange={setData} lang={lang} setLang={setLang} />;
  }

  return (
    <AppShell data={data} setData={setData} session={session} onLogout={() => setSession(null)}
      view={view} setView={setView} saveFlag={saveFlag} lang={lang} setLang={setLang} />
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
